"$id": "https://openrailwaymap.app/schema/signals_railway_signals.yaml"
"$schema": "https://json-schema.org/draft/2020-12/schema"
type: object
properties:
  features:
    type: array
    items:
      type: object
      properties:
        description:
          type: string
        feature:
          type: string
        layer:
          type: string
          enum:
            - standard
            - electrification
            - operator
        minzoom:
          type: number
          minimum: 1
          maximum: 20
        tags:
          type: array
          items:
            type: object
            properties:
              tag:
                type: string
              value:
                type: string
              values:
                type: array
                items:
                  type: string
        variants:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              feature:
                type: string
              layer:
                type: string
                enum:
                  - standard
                  - electrification
                  - operator
              minzoom:
                type: number
                minimum: 1
                maximum: 20
              tags:
                type: array
                items:
                  type: object
                  properties:
                    tag:
                      type: string
                    value:
                      type: string
                    values:
                      type: array
                      items:
                        type: string
            additionalProperties: false
      additionalProperties: false
  $schema:
    type: string
additionalProperties: false
